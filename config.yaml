# config.yaml
organism: "Klebsiella pneumoniae"
email: "example@mail.com"
retmax: 5

paths:
  metadata_dir: "data/metadata"
  host_metadata_dir: "data/host_metadata"
  sequences_dir: "data/sequences"
  ast_dir: "data/ast"
  results_dir: "results"
  reference_db_dir: "ref_db"

# ---------------- Configuration for ML setting ----------------
carabapenems:
  - imipenem
  - meropenem
  - doripenem
  - ertapenem
  - biapenem

ml: 
  column_target_name: "carbapenem_resistant"
  scaling:
    method: none   # standard | robust | none
  split:
    test_size: 0.3
    validation_size: 0.1
    stratify: True
    random_state: 42
# ---------------- Further configuration for perprocessing and constintency checks ----------------
breakpoints:
  doripenem: [1, 2]
  ertapenem: [0.5, 0.5]
  imipenem: [2, 4]
  imipenem-relebactam: [2, 2]
  meropenem: [2, 2]
  meropenem-vaborbactam: [8, 8]

genome_completeness_qc:
  completeness:
    min: 99        # genome must be ≥ 90%
  contamination:
    max: 3         # genome must be ≤ 3%
  total_contigs:
    max: 500       # genome must have ≤ 500 contigs

#configuration for preprocessing columns
preprocessing:
  structural:
    split_location: true
    split_mic: true
    split_latlon: true

  location:
    source_column: "geographic location"
    target_columns: ["Country", "State/Province"]
    latlon_column: "latitude and longitude"

  mic_split:
    column_contains:
      - "measurement"
    exclude_contains:
      - "sign"
      - "unit"
  encoding:
    encode_units: true
    units:
      units_column_contains:
        - "units"        # substring to detect unit-columns
      mapping:
        "mg/l": 1
        "mm": 2
    
    encode_comparison_signs: true
    sign_column_contains:
      - "measurement sign"
      - "_sign"
    comparison_signs:
      "<":  -2
      "<=": -1
      "==": 0
      "=":  0
      ">=": 1
      ">":  2

    encode_phenotypes: true
    phenotype:
      phenotype_column_contains:
        - "phenotype"
        - "resistance phenotype"
        - "_phen"
      #https://www.eucast.org/bacteria/clinical-breakpoints-and-interpretation/definition-of-s-i-and-r/
      eucast_phenotype_mapping: 
        - "S": 0
        - "I": 1
        - "R": 2
      mapping:
        "n": -1
        "nd": -1
        "not defined": -1
        "s": 0
        "sensitive": 0
        "susceptible": 0
        "i": 1
        "intermediate": 1
        "ns": 1
        "nonsusceptible": 1
        "ssd": 1
        "susceptible-dose dependent": 1
        "r": 2
        "resistant": 2
        "hlar": 2
        "high level aminoglycoside resistance": 2

  
    auto_one_hot_encode_rest: true
    auto_one_hot_exclude_exact:
        - "Assembled_seq"
    auto_one_hot_exclude_contains:
      - "measurement sign"
      - "measurement unit"
      - "phenotype"
      - "resistance phenotype"
      - "_phen"
  drop:
    explicit:
      - "BioSample"
      - "Run"
      - "isolate"
      - "collected by"
      - "collection date"
      - "host subject id"
      - "sample"
      - "organism_complex"

    contains:
      - "vendor"
      - "laboratory typing"
      - "testing standard"
      - "_id"
