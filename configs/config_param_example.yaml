# config.yaml based on user input
organism: "Klebsiella pneumoniae" #should align with NCBI organism names
email: "example@mail.com"
retmax: 5
Cores: 8 #default for unicycler
ml: 
  column_target_name: "carbapenem_resistant"
  scaling:
    method: none   # standard | robust | none
  split:
    test_size: 0.3
    validation_size: 0.1
    stratify: True
    random_state: 42

# configuration for genome constintency check
genome_completeness_qc:
  completeness:
    min: 99        # genome must be ≥ 90%
  contamination:
    max: 3         # genome must be ≤ 3%
  total_contigs:
    max: 500       # genome must have ≤ 500 contigs